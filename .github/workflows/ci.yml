name: CI

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt,clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Architecture guard - core must not depend on platform
        run: |
          if grep -r 'platform/' core/orchestral-core/Cargo.toml core/orchestral-runtime/Cargo.toml core/orchestral/Cargo.toml 2>/dev/null; then
            echo "FAIL: core/ crates must not depend on platform/"
            exit 1
          fi

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets
