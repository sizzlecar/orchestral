version: 1
name: skill-implicit-xlsx-smoke
config: ../orchestral.cli.yaml
no_mcp: true
timeout_secs: 300
workspace:
  copies:
    - from: ../../docs/绩效考核-2025Q4_副本.xlsx
      to: docs/绩效考核-2025Q4_运行副本.xlsx

turns:
  - name: fill-excel-with-implicit-skill
    input: >
      docs 目前下有一个 excel，你看下内容，把需要填的都填了。
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
      persist_not_contains:
        - "Plan: no actions"
        - "请提供 docs 下那个 Excel 的具体文件路径"
        - "无法保证内容填写正确"
      activity_contains:
        - "\"cells_filled\":"
      activity_not_contains:
        - "\"error\": \"LibreOffice macro not configured properly\""
        - "failed Shell command exited"
    verify:
      - name: workbook-fill-quality
        command: ../../.claude/skills/xlsx/.venv/bin/python3
        args:
          - validators/verify_perf_review_fill.py
          - docs/绩效考核-2025Q4_运行副本.xlsx
