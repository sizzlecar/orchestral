version: 1
name: deterministic-batch-doc-patch
config: ../orchestral.cli.yaml
no_mcp: true
no_skills: true
timeout_secs: 300
fresh_thread_per_turn: true
workspace:
  copies:
    - from: ../../fixtures/scenarios/deterministic_doc_patch/docs
      to: fixtures/scenarios/deterministic_doc_patch/docs
    - from: ../../fixtures/scenarios/deterministic_doc_patch/reports
      to: fixtures/scenarios/deterministic_doc_patch/reports

turns:
  - name: run-1
    input: >
      扫描 fixtures/scenarios/deterministic_doc_patch/docs 下所有 markdown，
      缺失一级标题的文档使用文件名转成标题补齐，
      再把修改摘要写到
      fixtures/scenarios/deterministic_doc_patch/reports/summary.md
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
      activity_contains:
        - "document_apply_patch"
      artifact_contains:
        - path: fixtures/scenarios/deterministic_doc_patch/docs/customer-onboarding.md
          text: "# Customer Onboarding"
        - path: fixtures/scenarios/deterministic_doc_patch/docs/release-checklist.md
          text: "# Release Checklist"
      capture_artifacts:
        - fixtures/scenarios/deterministic_doc_patch/docs/customer-onboarding.md
        - fixtures/scenarios/deterministic_doc_patch/docs/release-checklist.md
        - fixtures/scenarios/deterministic_doc_patch/reports/summary.md

  - name: run-2
    input: >
      扫描 fixtures/scenarios/deterministic_doc_patch/docs 下所有 markdown，
      缺失一级标题的文档使用文件名转成标题补齐，
      再把修改摘要写到
      fixtures/scenarios/deterministic_doc_patch/reports/summary.md
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
      activity_not_contains:
        - "document_apply_patch"
      artifact_matches_turn:
        - path: fixtures/scenarios/deterministic_doc_patch/docs/customer-onboarding.md
          turn: run-1
        - path: fixtures/scenarios/deterministic_doc_patch/docs/release-checklist.md
          turn: run-1
        - path: fixtures/scenarios/deterministic_doc_patch/reports/summary.md
          turn: run-1
      capture_artifacts:
        - fixtures/scenarios/deterministic_doc_patch/docs/customer-onboarding.md
        - fixtures/scenarios/deterministic_doc_patch/docs/release-checklist.md
        - fixtures/scenarios/deterministic_doc_patch/reports/summary.md

  - name: run-3
    input: >
      扫描 fixtures/scenarios/deterministic_doc_patch/docs 下所有 markdown，
      缺失一级标题的文档使用文件名转成标题补齐，
      再把修改摘要写到
      fixtures/scenarios/deterministic_doc_patch/reports/summary.md
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
      activity_not_contains:
        - "document_apply_patch"
      artifact_matches_turn:
        - path: fixtures/scenarios/deterministic_doc_patch/docs/customer-onboarding.md
          turn: run-1
        - path: fixtures/scenarios/deterministic_doc_patch/docs/release-checklist.md
          turn: run-1
        - path: fixtures/scenarios/deterministic_doc_patch/reports/summary.md
          turn: run-1
