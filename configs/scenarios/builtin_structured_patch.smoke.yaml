version: 1
name: builtin-structured-patch-smoke
config: ../orchestral.cli.yaml
no_mcp: true
no_skills: true
timeout_secs: 300
workspace:
  copies:
    - from: ../../fixtures/scenarios/structured_patch/config/app.json
      to: fixtures/scenarios/structured_patch/config/app.json

turns:
  - name: patch-structured-config
    input: >
      直接修改 fixtures/scenarios/structured_patch/config/app.json：
      把 service.enabled 改成 true，
      把 service.port 改成 9090，
      把 owner 改成 "platform-team"，
      把 features.audit 改成 true，
      并删除 obsolete 字段。直接写回。
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
      activity_not_contains:
        - "Plan: no actions"
    verify:
      - name: structured-patch-quality
        command: /bin/zsh
        cwd: ../..
        args:
          - -lc
          - >-
            cargo run -q -p orchestral-cli --example verify_structured_patch --
            "$ORCHESTRAL_SCENARIO_WORKSPACE_DIR/fixtures/scenarios/structured_patch/config/app.json"
