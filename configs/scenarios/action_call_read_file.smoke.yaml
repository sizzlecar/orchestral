version: 1
name: action-call-read-file
config: ../orchestral.cli.yaml
no_mcp: true
no_skills: true
timeout_secs: 180
workspace:
  copies:
    - from: ../../fixtures/scenarios/action_call_read_file/README.md
      to: README.md

turns:
  - name: read-readme
    input: >
      README 里写了什么
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
      execution_mode_contains:
        - "single_action"
        - "done"
      assistant_contains:
        - "Demo Readme"
        - "file_read action-call execution"
      assistant_not_contains:
        - "```shell"
        - "请告诉我执行结果"
        - "请确认"
      persist_not_contains:
        - "Plan: no actions"
