version: 1
name: builtin-batch-doc-patch-smoke
config: ../orchestral.cli.yaml
no_mcp: true
no_skills: true
timeout_secs: 300
cleanup:
  restore:
    - path: ../../logs/orchestral-runtime.log
    - path: ../../fixtures/scenarios/builtin_batch_doc_patch/docs
      extensions:
        - md
    - path: ../../fixtures/scenarios/builtin_batch_doc_patch/reports
      extensions:
        - md
  delete:
    - ../../.orchestral/tmp

turns:
  - name: propose-plan
    input: >
      扫描 fixtures/scenarios/builtin_batch_doc_patch/docs 下所有 markdown，
      把 TODO 和缺失标题补全，但先不要写回，先给出修改计划并等待我确认
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
  - name: apply-plan
    input: >
      确认，按计划写回，并把修改摘要写到
      fixtures/scenarios/builtin_batch_doc_patch/reports/summary.md
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
