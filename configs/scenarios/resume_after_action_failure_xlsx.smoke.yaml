version: 1
name: resume-after-action-failure-xlsx
config: ../orchestral.cli.yaml
env_file: ../../fixtures/scenarios/resume_after_failure/test.env
no_mcp: true
timeout_secs: 300
workspace:
  copies:
    - from: ../../docs/绩效考核-2025Q4_副本.xlsx
      to: docs/绩效考核-2025Q4_运行副本.xlsx

turns:
  - name: fail-once-during-commit-apply
    input: >
      用 xlsx skill 看 docs 目前下的 excel 内容，把需要填的都用合理的示例数据填了，不需要问我具体填什么。
    expect:
      require_execution_end: true
      execution_status: need_input
      max_approvals: 0
      max_errors: 1
      persist_contains:
        - "Reply 继续/重试 to retry from the failed step"
      persist_not_contains:
        - "Workbook updated and verified."
      activity_contains:
        - "shell failed=true"
  - name: resume-from-failed-apply-step
    input: >
      继续
    expect:
      require_execution_end: true
      max_approvals: 0
      max_errors: 0
      persist_contains:
        - "Workbook updated and verified."
      activity_contains:
        - "shell"
    verify:
      - name: workbook-fill-quality
        command: /bin/zsh
        args:
          - -lc
          - >-
            ok=0;
            for f in docs/*.xlsx; do
              ../../.claude/skills/xlsx/.venv/bin/python3 validators/verify_perf_review_fill.py "$f" && ok=1;
            done;
            [ "$ok" = "1" ]
