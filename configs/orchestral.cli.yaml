version: 1

app:
  name: orchestral-cli
  environment: development

runtime:
  max_interactions_per_thread: 10
  auto_cleanup: true
  concurrency_policy: interrupt_and_start_new
  strict_exports: true

planner:
  mode: llm
  # Requires GEMINI_API_KEY (or switch to deterministic mode for offline testing).
  backend: google
  model_profile: gemini-3-flash
  max_history: 20
  dynamic_model_selection: true

interpreter:
  mode: llm
  backend: google
  model_profile: gemini-2.5-flash
  temperature: 0.0

context:
  history_limit: 50
  max_tokens: 4096
  include_history: true
  include_references: true

ingestion:
  enabled: true
  asynchronous: true
  max_file_size_mb: 30
  mime_allowlist: []
  auto_for_assistant_outputs: true

extensions:
  # Backward-compatible alias: you may use `plugins:` with the same structure.
  runtime:
    # Optional docs ingestion extension (async parse/chunk/embed pipeline).
    # - name: builtin.docs_assistant
    #   enabled: true
    #   targets: ["cli", "server"]
    #   options:
    #     max_chunk_chars: 900
    #     chunk_overlap: 120
    #     embedding_dim: 24

stores:
  # For quick local testing in a single process.
  # If you need durable persistence, switch backend to postgres and add connection_url.
  # Example:
  # event:
  #   backend: postgres
  #   connection_url: "postgres://postgres:postgres@127.0.0.1:5432/orchestral"
  #   key_prefix: "orchestral"   # table prefix
  # Redis example:
  # event:
  #   backend: redis
  #   connection_url: "redis://127.0.0.1:6379"
  #   key_prefix: "orchestral:event"
  event:
    backend: in_memory
  task:
    backend: in_memory
  reference:
    backend: in_memory

blobs:
  mode: local
  local:
    root_dir: ".orchestral/blobs"
  s3:
    # Enable when mode is s3 or hybrid(write_to=s3).
    # endpoint: "http://127.0.0.1:9000" # Optional (MinIO/S3-compatible)
    # region: "us-east-1"
    # bucket: "orchestral-blobs"
    # access_key_env: "S3_ACCESS_KEY_ID"   # Optional, paired with secret_key_env
    # secret_key_env: "S3_SECRET_ACCESS_KEY"
    endpoint:
    region:
    bucket:
    key_prefix: "orchestral/blobs"
    access_key_env:
    secret_key_env:
    force_path_style: true
  hybrid:
    write_to: s3
  catalog:
    backend: in_memory
    connection_url:
    table_prefix: "orchestral"

observability:
  log_level: info
  traces_enabled: false
  # Runtime logs are persisted by default for easier debugging.
  # Can be overridden by ORCHESTRAL_LOG_FILE.
  log_file: "logs/orchestral-runtime.log"

providers:
  default_backend: openai
  default_model: fast
  backends:
    - name: openai
      kind: openai
      api_key_env: OPENAI_API_KEY
      config:
        timeout_secs: 30
    - name: google
      kind: google
      api_key_env: GEMINI_API_KEY
      config:
        timeout_secs: 60
        interpreter_timeout_secs: 8
  models:
    - name: fast
      backend: openai
      model: gpt-4o-mini
      temperature: 0.2
      system_prompt: |
        You are the planning engine for Orchestral.
        Generate executable plans only.
      policy:
        temperature_min: 0.0
        temperature_max: 1.0
    - name: deep
      backend: openai
      model: gpt-4.1
      temperature: 0.1
      policy:
        temperature_min: 0.0
        temperature_max: 0.7
    - name: gemini-3-flash
      backend: google
      model: gemini-3-flash-preview
      temperature: 0.2
      system_prompt: |
        You are the planning engine for Orchestral.
        Your job is to transform user intent into an executable DAG plan.

        Hard requirements:
        - Output JSON only. No markdown, no prose, no code fences.
        - Use only actions from the Action Catalog provided at runtime.
        - Prefer the smallest valid DAG that satisfies the goal.
        - Step IDs must be stable and unique (s1, s2, ...).
        - Respect action contracts:
          - step.params must satisfy each action's input_schema.
          - action outputs are validated against output_schema.
        - For cross-step data flow, declare io_bindings.
        - If information is missing, use a wait_user step to ask for clarification.
        - kind/depends_on/exports are optional for normal action steps and can be omitted.
          Only set kind explicitly for wait_user/wait_event/system steps.

        Plan shape reminder:
        {
          "goal": "...",
          "steps": [
            {
              "id": "s1",
              "action": "action_name",
              "params": {},
              "io_bindings": [{"from":"s1.key","to":"target_key","required":true}]
            }
          ],
          "confidence": 0.0
        }
      policy:
        temperature_min: 0.0
        temperature_max: 1.0
    - name: gemini-2.5-flash
      backend: google
      model: gemini-2.5-flash
      temperature: 0.2
actions:
  hot_reload: true
  # Optional: external process action (multi-language extension) example:
  # - name: echo_external
  #   kind: external_process
  #   description: "Echo via Python extension"
  #   interface:
  #     input_schema:
  #       type: object
  #       properties:
  #         message:
  #           type: string
  #       required: ["message"]
  #     output_schema:
  #       type: object
  #       properties:
  #         result:
  #           type: string
  #       required: ["result"]
  #   config:
  #     command: "python3"
  #     args: ["examples/extensions/echo_extension.py"]
  #     timeout_ms: 10000
  actions:
    - name: echo
      kind: echo
      description: "Echoes input back as output"
      interface:
        input_schema:
          type: object
          properties:
            message:
              type: string
              description: "Text to echo back."
              example: "hello orchestral"
          required: ["message"]
        output_schema:
          type: object
          properties:
            result:
              type: string
              description: "Echoed text result."
              example: "Echo: hello orchestral"
          required: ["result"]
      config:
        prefix: "Echo: "
    - name: doc_parse
      kind: doc_parse
      description: "Parse document with Kreuzberg Rust SDK and return normalized markdown structure"
      interface:
        input_schema:
          type: object
          properties:
            source_path:
              type: string
              description: "Local document path to parse (pdf/docx/pptx/xlsx/html/xml/email/archive/text...)."
              example: "docs/spec.pdf"
            extract_pages:
              type: boolean
              description: "Whether to include per-page extraction metadata."
              default: false
          required: ["source_path"]
        output_schema:
          type: object
          properties:
            source_path:
              type: string
            mime_type:
              type: string
            markdown:
              type: string
            headings:
              type: array
              items:
                type: object
                properties:
                  line:
                    type: integer
                  level:
                    type: integer
                  title:
                    type: string
            word_count:
              type: integer
            char_count:
              type: integer
            table_count:
              type: integer
            page_count:
              type: ["integer", "null"]
            parser:
              type: string
            metadata:
              type: object
          required: ["source_path", "markdown", "headings", "word_count", "char_count", "parser"]
      config:
        extract_pages: false
    - name: doc_convert
      kind: doc_convert
      description: "Convert documents via pandoc, using Kreuzberg markdown as canonical intermediate (source -> kreuzberg markdown -> pandoc target format)."
      interface:
        input_schema:
          type: object
          properties:
            source_path:
              type: string
              description: "Optional source file path. Either source_path or markdown must be provided."
              example: "docs/spec.docx"
            markdown:
              type: string
              description: "Optional markdown input. If provided, skips source_path parsing."
            to_format:
              type: string
              description: "Pandoc target format. markdown/md/gfm are normalized to gfm-raw_html."
              default: "gfm-raw_html"
              example: "gfm-raw_html"
            target_path:
              type: ["string", "null"]
              description: "Optional output file path. If omitted, converted content is returned inline."
              example: "output/spec.md"
            extra_args:
              type: array
              description: "Optional extra pandoc CLI args, e.g. ['--standalone']."
              items:
                type: string
            return_markdown:
              type: boolean
              description: "Whether to return intermediate markdown used for conversion."
              default: false
        output_schema:
          type: object
          properties:
            source_path:
              type: ["string", "null"]
            to_format:
              type: string
            target_path:
              type: ["string", "null"]
            wrote_file:
              type: boolean
            bytes:
              type: ["integer", "null"]
            content:
              type: string
            pandoc_command:
              type: string
            parser:
              type: string
          required: ["to_format", "target_path", "wrote_file", "pandoc_command", "parser"]
      config:
        pandoc_command: "pandoc"
        default_to_format: "gfm-raw_html"
        timeout_ms: 180000
    - name: doc_summarize
      kind: doc_summarize
      description: "Generate summary/outline/overview markdown from document content."
      interface:
        input_schema:
          type: object
          properties:
            source_path:
              type: string
              description: "Optional source file path. Either source_path or markdown must be provided."
            markdown:
              type: string
              description: "Optional markdown input."
            mode:
              type: string
              description: "summary | outline | overview"
              default: "summary"
            summary_sentences:
              type: integer
              default: 5
            target_path:
              type: ["string", "null"]
        output_schema:
          type: object
          properties:
            source_path:
              type: ["string", "null"]
            mode:
              type: string
            generated_markdown:
              type: string
            target_path:
              type: ["string", "null"]
            wrote_file:
              type: boolean
            bytes:
              type: ["integer", "null"]
            word_count:
              type: integer
            heading_count:
              type: integer
            parser:
              type: string
          required: ["mode", "generated_markdown", "wrote_file", "parser"]
      config:
        default_mode: "summary"
        default_sentences: 5
    - name: doc_generate
      kind: doc_generate
      description: "Generate markdown documents from body/sections/source snippets, optionally convert via pandoc."
      interface:
        input_schema:
          type: object
          properties:
            title:
              type: string
              default: "Generated Document"
            body:
              type: string
            sections:
              type: array
              items:
                type: object
                properties:
                  heading:
                    type: string
                  content:
                    type: string
                required: ["heading"]
            source_markdowns:
              type: array
              items:
                type: string
            to_format:
              type: string
              default: "markdown"
            target_path:
              type: ["string", "null"]
            extra_args:
              type: array
              items:
                type: string
        output_schema:
          type: object
          properties:
            mode:
              type: string
            to_format:
              type: string
            target_path:
              type: ["string", "null"]
            generated_markdown:
              type: string
            wrote_file:
              type: boolean
            bytes:
              type: ["integer", "null"]
            content:
              type: string
            pandoc_command:
              type: string
          required: ["mode", "to_format", "generated_markdown", "wrote_file"]
      config:
        pandoc_command: "pandoc"
        timeout_ms: 180000
    - name: doc_qa
      kind: doc_qa
      description: "Answer questions against document content with evidence snippets."
      interface:
        input_schema:
          type: object
          properties:
            source_path:
              type: string
            markdown:
              type: string
            question:
              type: string
            top_k:
              type: integer
              default: 3
          required: ["question"]
        output_schema:
          type: object
          properties:
            source_path:
              type: ["string", "null"]
            question:
              type: string
            answer:
              type: string
            top_k:
              type: integer
            evidence:
              type: array
              items:
                type: object
                properties:
                  rank:
                    type: integer
                  score:
                    type: integer
                  token_overlap:
                    type: integer
                  excerpt:
                    type: string
          required: ["question", "answer", "evidence"]
      config:
        default_top_k: 3
    - name: doc_merge
      kind: doc_merge
      description: "Merge multiple documents/snippets into one markdown artifact, optionally convert via pandoc."
      interface:
        input_schema:
          type: object
          properties:
            source_paths:
              type: array
              items:
                type: string
            markdowns:
              type: array
              items:
                type: string
            separator:
              type: string
              default: "\n\n---\n\n"
            add_source_headers:
              type: boolean
              default: true
            to_format:
              type: string
              default: "markdown"
            target_path:
              type: ["string", "null"]
            extra_args:
              type: array
              items:
                type: string
        output_schema:
          type: object
          properties:
            mode:
              type: string
            source_count:
              type: integer
            to_format:
              type: string
            target_path:
              type: ["string", "null"]
            merged_markdown:
              type: string
            wrote_file:
              type: boolean
            bytes:
              type: ["integer", "null"]
            content:
              type: string
            pandoc_command:
              type: string
          required: ["mode", "source_count", "to_format", "merged_markdown", "wrote_file"]
      config:
        add_source_headers: true
        pandoc_command: "pandoc"
        timeout_ms: 180000
    - name: http
      kind: http
      description: "Performs an HTTP request"
      interface:
        input_schema:
          type: object
          properties:
            method:
              type: string
              description: "HTTP method."
              default: "GET"
              example: "GET"
            url:
              type: string
              description: "Request URL."
              example: "https://www.google.com"
            headers:
              type: object
              description: "Optional request headers."
            body: {}
            json: {}
          required: ["url"]
        output_schema:
          type: object
          properties:
            status:
              type: integer
              description: "HTTP status code."
              example: 200
            url:
              type: string
              description: "Resolved request URL."
            headers:
              type: object
              description: "Response headers."
            body:
              type: string
              description: "Response body as text."
          required: ["status", "url", "headers", "body"]
      config:
        default_method: "GET"
        timeout_ms: 10000
    - name: shell
      kind: shell
      description: "Runs a shell command"
      interface:
        input_schema:
          type: object
          properties:
            command:
              type: string
              description: "Executable name or shell command string."
              example: "ls"
            args:
              type: array
              description: "Optional arguments. If missing, command runs via sh -c."
              items:
                type: string
              example: ["-la"]
            shell:
              type: boolean
              description: "Whether to execute command as a shell expression (`sh -c`)."
            sandbox_mode:
              type: string
              description: "Optional override: none/read_only/workspace_write."
            sandbox_backend:
              type: string
              description: "Optional override: auto/macos_seatbelt/linux_seccomp/windows_restricted."
          required: ["command"]
        output_schema:
          type: object
          properties:
            stdout:
              type: string
              description: "Captured stdout."
            stderr:
              type: string
              description: "Captured stderr."
            status:
              type: integer
              description: "Process exit status code."
            timed_out:
              type: boolean
              description: "Whether process timed out and was killed."
            stdout_truncated:
              type: boolean
              description: "Whether stdout exceeded max_output_bytes."
            stderr_truncated:
              type: boolean
              description: "Whether stderr exceeded max_output_bytes."
            sandbox_mode:
              type: string
              description: "Applied sandbox mode."
            sandboxed:
              type: boolean
              description: "Whether command ran with OS sandbox wrapper."
            sandbox_backend:
              type: string
              description: "Resolved sandbox backend name."
            env_policy:
              type: string
              description: "Applied environment policy."
          required: ["stdout", "stderr", "status", "timed_out", "stdout_truncated", "stderr_truncated", "sandbox_mode", "sandboxed", "sandbox_backend", "env_policy"]
      config:
        timeout_ms: 10000
        allow_shell_expression: false
        max_output_bytes: 65536
        sandbox_mode: workspace_write
        sandbox_backend: auto
        sandbox_allow_network: false
        # Linux only (optional): explicit bubblewrap executable path.
        # sandbox_linux_bwrap_path: "/usr/bin/bwrap"
        sandbox_writable_roots: ["."]
        env_policy: minimal
        env_denylist: ["OPENAI_API_KEY", "GEMINI_API_KEY", "HF_TOKEN"]
        blocked_commands: ["mkfs", "shutdown", "reboot", "poweroff"]
    - name: file_read
      kind: file_read
      description: "Reads a file from disk"
      interface:
        input_schema:
          type: object
          properties:
            path:
              type: string
              description: "File path to read (must stay under sandbox_writable_roots when sandbox is enabled)."
              example: "docs/readme.md"
            max_bytes:
              type: integer
              description: "Read at most this many bytes."
            truncate:
              type: boolean
              description: "When true, oversize files are truncated."
          required: ["path"]
        output_schema:
          type: object
          properties:
            content:
              type: string
              description: "File content as UTF-8 text."
            path:
              type: string
              description: "Resolved absolute path."
            bytes:
              type: integer
              description: "Returned content bytes."
            truncated:
              type: boolean
              description: "Whether content was truncated."
          required: ["content", "path", "bytes", "truncated"]
      config:
        sandbox_mode: workspace_write
        sandbox_writable_roots: ["."]
        max_read_bytes: 524288
    - name: file_write
      kind: file_write
      description: "Writes a file to disk"
      interface:
        input_schema:
          type: object
          properties:
            path:
              type: string
              description: "Target file path to write (must stay under sandbox_writable_roots when sandbox is enabled)."
              example: "output/google.html"
            content:
              type: string
              description: "Text content to write."
            append:
              type: boolean
              description: "Append instead of overwrite."
              default: false
            max_bytes:
              type: integer
              description: "Maximum bytes allowed for content in this call."
          required: ["path", "content"]
        output_schema:
          type: object
          properties:
            path:
              type: string
              description: "Resolved absolute path."
            bytes:
              type: integer
              description: "Bytes written to file."
          required: ["path", "bytes"]
      config:
        sandbox_mode: workspace_write
        sandbox_writable_roots: ["."]
        create_dirs: true
        max_write_bytes: 524288
