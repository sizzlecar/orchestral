version: 1
app:
  name: orchestral-cli
  environment: development
runtime:
  max_interactions_per_thread: 10
  auto_cleanup: true
  concurrency_policy: interrupt_and_start_new
  strict_exports: true
  max_planner_iterations: 6
planner:
  mode: llm
  backend: openrouter
  model_profile: claude-sonnet-4-5-openrouter
  max_history: 20
  log_full_prompts: true
  dynamic_model_selection: true
  model: null
  temperature: null
context:
  history_limit: 50
  max_tokens: 4096
  include_history: true
  include_references: true
ingestion:
  enabled: true
  asynchronous: true
  max_file_size_mb: 30
  mime_allowlist: []
  auto_for_assistant_outputs: true
extensions:
  mcp:
    enabled: true
    auto_discover: true
  skill:
    enabled: true
    auto_discover: true
  runtime:
  - name: builtin.docs_assistant
    enabled: true
    targets:
    - cli
    - server
    options:
      max_chunk_chars: 900
      chunk_overlap: 120
      embedding_dim: 24
      enable_placeholder_embeddings: false
      action_allowlist:
      - doc_parse
      - doc_convert
      - doc_generate
      - doc_merge
stores:
  event:
    backend: sqlite
    connection_url: sqlite://orchestral-runtime.db
    key_prefix: orchestral
  task:
    backend: sqlite
    connection_url: sqlite://orchestral-runtime.db
    key_prefix: orchestral
  reference:
    backend: sqlite_vector
    connection_url: sqlite://orchestral-runtime.db
    key_prefix: orchestral
blobs:
  mode: local
  local:
    root_dir: .orchestral/blobs
  s3:
    endpoint: null
    region: null
    bucket: null
    key_prefix: orchestral/blobs
    access_key_env: null
    secret_key_env: null
    force_path_style: true
  hybrid:
    write_to: s3
  catalog:
    backend: in_memory
    connection_url: null
    table_prefix: orchestral
observability:
  log_level: info
  traces_enabled: false
  log_file: logs/orchestral-runtime.log
providers:
  default_backend: openai
  default_model: gpt-4o-mini
  backends:
  - name: openai
    kind: openai
    api_key_env: OPENAI_API_KEY
    config:
      max_tokens: 4096
      timeout_secs: 120
  - name: google
    kind: google
    api_key_env: GOOGLE_API_KEY
    config:
      max_tokens: 4096
      timeout_secs: 120
      interpreter_timeout_secs: 8
  - name: anthropic
    kind: anthropic
    api_key_env: ANTHROPIC_API_KEY
    config:
      max_tokens: 4096
      timeout_secs: 120
      interpreter_timeout_secs: 8
  - name: openrouter
    kind: openrouter
    api_key_env: OPENROUTER_API_KEY
    endpoint: https://openrouter.ai/api/v1/
    config:
      max_tokens: 4096
      timeout_secs: 120
  models:
  - name: gpt-4o-mini
    backend: openai
    model: gpt-4o-mini
    temperature: 0.2
    policy:
      temperature_min: 0.0
      temperature_max: 1.0
  - name: gemini-2.5-flash
    backend: google
    model: gemini-2.5-flash
    temperature: 0.2
    policy:
      temperature_min: 0.0
      temperature_max: 1.0
  - name: claude-sonnet-4-5
    backend: anthropic
    model: claude-sonnet-4-5
    temperature: 0.2
    policy:
      temperature_min: 0.0
      temperature_max: 1.0
  - name: gemini-3-flash
    backend: google
    model: gemini-3.1-pro-preview
    temperature: 0.2
    policy:
      temperature_min: 0.0
      temperature_max: 1.0
  - name: claude-opus-4-6
    backend: openrouter
    model: anthropic/claude-opus-4.6
    temperature: 0.1
    policy:
      temperature_min: 0.0
      temperature_max: 0.7
  - name: claude-opus-4-1
    backend: openrouter
    model: anthropic/claude-opus-4.1
    temperature: 0.1
    policy:
      temperature_min: 0.0
      temperature_max: 0.7
  - name: claude-sonnet-4-5-openrouter
    backend: openrouter
    model: anthropic/claude-sonnet-4.5
    temperature: 0.2
    policy:
      temperature_min: 0.0
      temperature_max: 1.0
actions:
  hot_reload: true
  actions:
  - name: http
    kind: http
    description: Performs an HTTP request
    interface:
      input_schema:
        type: object
        properties:
          method:
            type: string
            description: HTTP method.
            default: GET
            example: GET
          url:
            type: string
            description: Request URL.
            example: https://www.google.com
          headers:
            type: object
            description: Optional request headers.
          body: {}
          json: {}
        required:
        - url
      output_schema:
        type: object
        properties:
          status:
            type: integer
            description: HTTP status code.
            example: 200
          url:
            type: string
            description: Resolved request URL.
          headers:
            type: object
            description: Response headers.
          body:
            type: string
            description: Response body as text.
        required:
        - status
        - url
        - headers
        - body
    config:
      default_method: GET
      timeout_ms: 10000
  - name: shell
    kind: shell
    description: Runs a shell command
    interface:
      input_schema:
        type: object
        properties:
          command:
            type: string
            description: Executable name or shell command string.
            example: ls
          args:
            type: array
            description: Optional arguments. If missing, command runs via sh -c.
            items:
              type: string
            example:
            - -la
          shell:
            type: boolean
            description: Whether to execute command as a shell expression (`sh -c`).
          sandbox_mode:
            type: string
            description: 'Optional override: none/read_only/workspace_write.'
          sandbox_backend:
            type: string
            description: 'Optional override: auto/macos_seatbelt/linux_seccomp/windows_restricted.'
        required:
        - command
      output_schema:
        type: object
        properties:
          stdout:
            type: string
            description: Captured stdout.
          stderr:
            type: string
            description: Captured stderr.
          status:
            type: integer
            description: Process exit status code.
          timed_out:
            type: boolean
            description: Whether process timed out and was killed.
          stdout_truncated:
            type: boolean
            description: Whether stdout exceeded max_output_bytes.
          stderr_truncated:
            type: boolean
            description: Whether stderr exceeded max_output_bytes.
          sandbox_mode:
            type: string
            description: Applied sandbox mode.
          sandboxed:
            type: boolean
            description: Whether command ran with OS sandbox wrapper.
          sandbox_backend:
            type: string
            description: Resolved sandbox backend name.
          env_policy:
            type: string
            description: Applied environment policy.
        required:
        - stdout
        - stderr
        - status
        - timed_out
        - stdout_truncated
        - stderr_truncated
        - sandbox_mode
        - sandboxed
        - sandbox_backend
        - env_policy
    config:
      timeout_ms: 10000
      fail_on_non_zero: true
      allow_shell_expression: false
      max_output_bytes: 65536
      sandbox_mode: workspace_write
      sandbox_backend: auto
      sandbox_allow_network: false
      sandbox_writable_roots:
      - .
      env_policy: inherit
      env_denylist:
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      - GEMINI_API_KEY
      - ANTHROPIC_API_KEY
      - CLAUDE_API_KEY
      - OPENROUTER_API_KEY
      - HF_TOKEN
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      blocked_commands:
      - mkfs
      - shutdown
      - reboot
      - poweroff
  - name: file_read
    kind: file_read
    description: Reads a file from disk
    interface:
      input_schema:
        type: object
        properties:
          path:
            type: string
            description: File path to read (must stay under sandbox_writable_roots when sandbox is enabled).
            example: docs/readme.md
          max_bytes:
            type: integer
            description: Read at most this many bytes.
          truncate:
            type: boolean
            description: When true, oversize files are truncated.
        required:
        - path
      output_schema:
        type: object
        properties:
          content:
            type: string
            description: File content as UTF-8 text.
          path:
            type: string
            description: Resolved absolute path.
          bytes:
            type: integer
            description: Returned content bytes.
          truncated:
            type: boolean
            description: Whether content was truncated.
        required:
        - content
        - path
        - bytes
        - truncated
    config:
      sandbox_mode: workspace_write
      sandbox_writable_roots:
      - .
      max_read_bytes: 524288
  - name: file_write
    kind: file_write
    description: Writes a file to disk
    interface:
      input_schema:
        type: object
        properties:
          path:
            type: string
            description: Target file path to write (must stay under sandbox_writable_roots when sandbox is enabled).
            example: output/google.html
          content:
            type: string
            description: Text content to write.
          append:
            type: boolean
            description: Append instead of overwrite.
            default: false
          max_bytes:
            type: integer
            description: Maximum bytes allowed for content in this call.
        required:
        - path
        - content
      output_schema:
        type: object
        properties:
          path:
            type: string
            description: Resolved absolute path.
          bytes:
            type: integer
            description: Bytes written to file.
        required:
        - path
        - bytes
    config:
      sandbox_mode: workspace_write
      sandbox_writable_roots:
      - .
      create_dirs: true
      max_write_bytes: 524288
  - name: spreadsheet_locate
    kind: spreadsheet_locate
    description: 'Locate a spreadsheet artifact '
    interface:
      input_schema:
        type: object
        properties:
          source_root:
            type: string
          user_request:
            type: string
      output_schema:
        type: object
        properties:
          source_path:
            type: string
          artifact_candidates:
            type: array
            items:
              type: string
          artifact_count:
            type: integer
        required:
        - source_path
        - artifact_candidates
        - artifact_count
    config: {}
  - name: spreadsheet_inspect
    kind: spreadsheet_inspect
    description: 'Inspect spreadsheet structure '
    interface:
      input_schema:
        type: object
        properties:
          path:
            type: string
        required:
        - path
      output_schema:
        type: object
        properties:
          inspection:
            type: object
        required:
        - inspection
    config: {}
  - name: spreadsheet_derive_candidates
    kind: spreadsheet_derive_candidates
    description: Derive spreadsheet patch candidates
    interface:
      input_schema:
        type: object
        properties:
          user_request:
            type: string
          inspection:
            type: object
          derivation_policy:
            type: string
            enum:
            - strict
            - permissive
        required:
        - user_request
        - inspection
        - derivation_policy
      output_schema:
        type: object
        properties:
          patch_candidates:
            type: object
          summary:
            type: string
        required:
        - patch_candidates
        - summary
    config: {}
  - name: spreadsheet_assess_readiness
    kind: spreadsheet_assess_readiness
    description: Assess whether spreadsheet probe results are ready for commit
    interface:
      input_schema:
        type: object
        properties:
          inspection:
            type: object
          patch_candidates: {}
          derivation_policy:
            type: string
        required:
        - inspection
        - patch_candidates
        - derivation_policy
      output_schema:
        type: object
        properties:
          continuation:
            type: object
          summary:
            type: string
        required:
        - continuation
        - summary
    config: {}
  - name: spreadsheet_apply_patch
    kind: spreadsheet_apply_patch
    description: 'Apply a typed spreadsheet patch '
    interface:
      input_schema:
        type: object
        properties:
          path:
            type: string
          patch_spec:
            type: object
        required:
        - path
        - patch_spec
      output_schema:
        type: object
        properties:
          updated_file_path:
            type: string
          patch_count:
            type: integer
          cells_filled:
            type: integer
          result:
            type: string
          summary:
            type: string
        required:
        - updated_file_path
        - patch_count
        - summary
    config: {}
  - name: spreadsheet_verify_patch
    kind: spreadsheet_verify_patch
    description: 'Verify a spreadsheet patch '
    interface:
      input_schema:
        type: object
        properties:
          path:
            type: string
          patch_spec:
            type: object
          validator_path:
            type: string
        required:
        - path
      output_schema:
        type: object
        properties:
          verify_decision:
            type: object
          summary:
            type: string
        required:
        - verify_decision
        - summary
    config:
      default_validator_path: configs/scenarios/validators/verify_perf_review_fill.py
  - name: document_locate
    kind: document_locate
    description: 'Locate document artifacts '
    interface:
      input_schema:
        type: object
        properties:
          source_root:
            type: string
          user_request:
            type: string
      output_schema:
        type: object
        properties:
          source_paths:
            type: array
            items:
              type: string
          documents:
            type: array
            items:
              type: string
          artifact_candidates:
            type: array
            items:
              type: string
          artifact_count:
            type: integer
          report_path:
            type: string
        required:
        - source_paths
        - artifact_candidates
        - artifact_count
    config: {}
  - name: document_inspect
    kind: document_inspect
    description: 'Inspect document structure '
    interface:
      input_schema:
        type: object
        properties:
          source_paths:
            oneOf:
            - type: array
              items:
                type: string
            - type: string
          documents:
            oneOf:
            - type: array
              items:
                type: string
            - type: string
          source_path:
            oneOf:
            - type: string
            - type: array
              items:
                type: string
          path:
            oneOf:
            - type: string
            - type: array
              items:
                type: string
          document:
            oneOf:
            - type: string
            - type: array
              items:
                type: string
      output_schema:
        type: object
        properties:
          inspection:
            type: object
        required:
        - inspection
    config: {}
  - name: document_derive_candidates
    kind: document_derive_candidates
    description: Derive typed document patch candidates from document inspection
    interface:
      input_schema:
        type: object
        properties:
          user_request:
            type: string
          inspection:
            type: object
          derivation_policy:
            type: string
        required:
        - user_request
        - inspection
        - derivation_policy
      output_schema:
        type: object
        properties:
          patch_candidates:
            type: object
          summary:
            type: string
        required:
        - patch_candidates
        - summary
    config: {}
  - name: document_build_patch_spec
    kind: document_build_patch_spec
    description: Build a typed document patch spec from document patch candidates
    interface:
      input_schema:
        type: object
        properties:
          patch_candidates:
            type: object
          inspection:
            type: object
        required:
        - patch_candidates
        - inspection
      output_schema:
        type: object
        properties:
          patch_spec:
            type: object
          summary:
            type: string
        required:
        - patch_spec
        - summary
    config: {}
  - name: document_assess_readiness
    kind: document_assess_readiness
    description: Assess whether document probe results are ready for commit
    interface:
      input_schema:
        type: object
        properties:
          inspection:
            type: object
          patch_candidates:
            type: object
          derivation_policy:
            type: string
          user_request:
            type: string
        required:
        - inspection
        - patch_candidates
        - derivation_policy
        - user_request
      output_schema:
        type: object
        properties:
          continuation:
            type: object
          summary:
            type: string
        required:
        - continuation
        - summary
    config: {}
  - name: document_apply_patch
    kind: document_apply_patch
    description: 'Apply a typed document patch '
    interface:
      input_schema:
        type: object
        properties:
          patch_spec:
            type: object
        required:
        - patch_spec
      output_schema:
        type: object
        properties:
          updated_paths:
            type: array
            items:
              type: string
          patch_count:
            type: integer
          summary:
            type: string
        required:
        - updated_paths
        - patch_count
        - summary
    config: {}
  - name: document_verify_patch
    kind: document_verify_patch
    description: 'Verify a document patch '
    interface:
      input_schema:
        type: object
        properties:
          patch_spec:
            type: object
          inspection:
            type: object
          user_request:
            type: string
          resume_user_input: {}
        required:
        - patch_spec
        - inspection
        - user_request
      output_schema:
        type: object
        properties:
          verify_decision:
            type: object
          summary:
            type: string
        required:
        - verify_decision
        - summary
    config: {}
  - name: structured_locate
    kind: structured_locate
    description: 'Locate structured artifacts '
    interface:
      input_schema:
        type: object
        properties:
          source_root:
            type: string
          user_request:
            type: string
      output_schema:
        type: object
        properties:
          source_paths:
            type: array
            items:
              type: string
          artifact_candidates:
            type: array
            items:
              type: string
          artifact_count:
            type: integer
        required:
        - source_paths
        - artifact_candidates
        - artifact_count
    config: {}
  - name: structured_inspect
    kind: structured_inspect
    description: 'Inspect structured artifact contents '
    interface:
      input_schema:
        type: object
        properties:
          source_paths:
            type: array
            items:
              type: string
        required:
        - source_paths
      output_schema:
        type: object
        properties:
          inspection:
            type: object
        required:
        - inspection
    config: {}
  - name: structured_derive_candidates
    kind: structured_derive_candidates
    description: Derive typed structured patch candidates from explicit user requests
    interface:
      input_schema:
        type: object
        properties:
          user_request:
            type: string
          inspection:
            type: object
          derivation_policy:
            type: string
        required:
        - user_request
        - inspection
        - derivation_policy
      output_schema:
        type: object
        properties:
          patch_candidates:
            type: object
          summary:
            type: string
        required:
        - patch_candidates
        - summary
    config: {}
  - name: structured_assess_readiness
    kind: structured_assess_readiness
    description: Assess whether structured probe results are ready for commit
    interface:
      input_schema:
        type: object
        properties:
          inspection:
            type: object
          patch_candidates:
            type: object
          derivation_policy:
            type: string
        required:
        - inspection
        - patch_candidates
        - derivation_policy
      output_schema:
        type: object
        properties:
          continuation:
            type: object
          summary:
            type: string
        required:
        - continuation
        - summary
    config: {}
  - name: structured_build_patch_spec
    kind: structured_build_patch_spec
    description: Build a typed structured patch spec from structured patch candidates
    interface:
      input_schema:
        type: object
        properties:
          patch_candidates:
            type: object
        required:
        - patch_candidates
      output_schema:
        type: object
        properties:
          patch_spec:
            type: object
          summary:
            type: string
        required:
        - patch_spec
        - summary
    config: {}
  - name: structured_apply_patch
    kind: structured_apply_patch
    description: 'Apply a typed structured patch '
    interface:
      input_schema:
        type: object
        properties:
          patch_spec:
            type: object
        required:
        - patch_spec
      output_schema:
        type: object
        properties:
          updated_paths:
            type: array
            items:
              type: string
          patch_count:
            type: integer
          summary:
            type: string
        required:
        - updated_paths
        - patch_count
        - summary
    config: {}
  - name: structured_verify_patch
    kind: structured_verify_patch
    description: 'Verify a structured patch '
    interface:
      input_schema:
        type: object
        properties:
          patch_spec:
            type: object
          inspection:
            type: object
        required:
        - patch_spec
      output_schema:
        type: object
        properties:
          verify_decision:
            type: object
          summary:
            type: string
        required:
        - verify_decision
        - summary
    config: {}
  - name: codebase_collect_targets
    kind: codebase_collect_targets
    description: 'Collect explicit mixed-artifact targets '
    interface:
      input_schema:
        type: object
        properties:
          user_request:
            type: string
        required:
        - user_request
      output_schema:
        type: object
        properties:
          instruction_path:
            type: string
          instruction_source_paths:
            type: array
            items:
              type: string
          spreadsheet_path:
            type: string
          structured_path:
            type: string
          structured_source_paths:
            type: array
            items:
              type: string
        required:
        - instruction_path
        - instruction_source_paths
        - spreadsheet_path
        - structured_path
        - structured_source_paths
    config: {}
  - name: codebase_collect_results
    kind: codebase_collect_results
    description: 'Collect mixed-artifact run results '
    interface:
      input_schema:
        type: object
        properties:
          spreadsheet_path:
            type: string
          structured_paths:
            type: array
            items:
              type: string
          execution_summary:
            type: string
        required:
        - spreadsheet_path
        - structured_paths
        - execution_summary
      output_schema:
        type: object
        properties:
          collected_result:
            type: object
          summary:
            type: string
        required:
        - collected_result
        - summary
    config: {}
  - name: codebase_aggregate_verify
    kind: codebase_aggregate_verify
    description: 'Aggregate mixed-artifact verify results '
    interface:
      input_schema:
        type: object
        properties:
          spreadsheet_verify_decision:
            type: object
          structured_verify_decision:
            type: object
          collected_result:
            type: object
        required:
        - spreadsheet_verify_decision
        - structured_verify_decision
        - collected_result
      output_schema:
        type: object
        properties:
          verify_decision:
            type: object
          summary:
            type: string
        required:
        - verify_decision
        - summary
    config: {}
  - name: codebase_export_summary
    kind: codebase_export_summary
    description: 'Export a unified mixed-artifact summary '
    interface:
      input_schema:
        type: object
        properties:
          collected_result:
            type: object
          verify_decision:
            type: object
        required:
        - collected_result
        - verify_decision
      output_schema:
        type: object
        properties:
          summary:
            type: string
        required:
        - summary
    config: {}
